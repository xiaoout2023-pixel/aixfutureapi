name: Update Leaderboard

on:
  schedule:
    - cron: '0 3 1,16 * *'
  workflow_dispatch:

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install openpyxl

      - name: Run leaderboard crawler
        env:
          APP_ENV: uat
        run: python crawler/run_leaderboard.py
