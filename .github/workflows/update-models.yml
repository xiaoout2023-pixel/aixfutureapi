name: Update Models Data

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-models:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crawlers
        env:
          APP_ENV: uat
        run: |
          python crawler/run_all.py

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet api/models.json || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add api/models.json
          git commit -m "chore: update models data $(date +'%Y-%m-%d %H:%M:%S')"
          git push

      - name: Summary
        run: |
          echo "## Crawler Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Run at: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- Models file updated: ${{ steps.git-check.outputs.changes == 'true' }}" >> $GITHUB_STEP_SUMMARY
