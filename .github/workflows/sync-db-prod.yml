name: Sync UAT to PROD Database

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "SYNC" to confirm syncing UAT database to PROD'
        required: true
        type: string

jobs:
  sync:
    if: ${{ github.event.inputs.confirm == 'SYNC' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Sync UAT to PROD
        env:
          UAT_DB_URL: ${{ secrets.TURSO_UAT_URL }}
          UAT_DB_TOKEN: ${{ secrets.TURSO_UAT_TOKEN }}
          PROD_DB_URL: ${{ secrets.TURSO_PROD_URL }}
          PROD_DB_TOKEN: ${{ secrets.TURSO_PROD_TOKEN }}
        run: python scripts/sync_uat_to_prod.py

      - name: Verify sync
        env:
          UAT_DB_URL: ${{ secrets.TURSO_UAT_URL }}
          UAT_DB_TOKEN: ${{ secrets.TURSO_UAT_TOKEN }}
          PROD_DB_URL: ${{ secrets.TURSO_PROD_URL }}
          PROD_DB_TOKEN: ${{ secrets.TURSO_PROD_TOKEN }}
        run: python scripts/verify_prod_sync.py
